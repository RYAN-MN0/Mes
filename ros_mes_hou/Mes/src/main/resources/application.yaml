spring:
  application:
    name: Mes
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mes
    username: root
    password: 123456

server:
  port: 8090
  address: 0.0.0.0
mybatis:
  configuration:
#    匹配驼峰法与下划线法的命名方式
    map-underscore-to-camel-case: true
#    开启Mybatics日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#  XML映射配置文件的路径
#  mapper-locations: classpath:mapper/*.xml
